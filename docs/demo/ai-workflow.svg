    <rect x="24" y="24" width="118" height="34" rx="17" class="chip" />
    <text x="46" y="46" class="label">AI Draft</text>

    <text x="24" y="98" class="sectionTitle">智能配音</text>
    <text x="24" y="132" class="body">1. 选择模型和音色</text>
    <text x="24" y="166" class="body">2. 输入创作需求与风格</text>
    <text x="24" y="200" class="body">3. AI 生成可朗读文稿</text>
    <text x="24" y="234" class="body">4. 试听、导出并写入历史</text>

    <rect x="24" y="276" width="272" height="48" rx="20" class="action" />
    <text x="70" y="306" class="actionText">Model: gpt-4o-mini</text>
  </g>

  <g class="shadow" transform="translate(480 210)">
    <rect width="320" height="360" rx="28" class="card" />
    <rect x="24" y="24" width="146" height="34" rx="17" class="chip" />
