<svg width="1280" height="760" viewBox="0 0 1280 760" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #f5f7ff; }
    .panel { fill: #eef2ff; }
    .card { fill: #ffffff; stroke: #dbe2ff; stroke-width: 2; }
    .shadow { filter: drop-shadow(0 20px 36px rgba(85, 101, 214, 0.12)); }
    .title { font: 700 34px 'Segoe UI', sans-serif; fill: #2f3b86; }
    .subtitle { font: 500 18px 'Segoe UI', sans-serif; fill: #5d689d; }
    .sectionTitle { font: 700 28px 'Segoe UI', sans-serif; fill: #3341a1; }
    .label { font: 700 17px 'Segoe UI', sans-serif; fill: #5461c9; }
    .body { font: 500 17px 'Segoe UI', sans-serif; fill: #6170a2; }
    .small { font: 600 15px 'Segoe UI', sans-serif; fill: #6a76af; }
    .chip { fill: #edf1ff; }
    .action { fill: #5866dd; }
    .actionAlt { fill: #e9edff; }
    .actionText { font: 700 18px 'Segoe UI', sans-serif; fill: #ffffff; }
    .actionTextAlt { font: 700 16px 'Segoe UI', sans-serif; fill: #5260ca; }
    .line { stroke: #98a6ff; stroke-width: 8; stroke-linecap: round; stroke-dasharray: 14 16; }
    .node { fill: #6a78ea; }
  </style>

  <rect class="bg" width="1280" height="760" rx="36" />
  <rect x="54" y="44" width="1172" height="672" rx="34" class="panel" />

  <text x="86" y="102" class="title">ParrotSound AI Workflow</text>
  <text x="86" y="136" class="subtitle">OpenAI-Compatible models, visible product integration, and real frontend-backend closure.</text>
  <text x="86" y="164" class="subtitle">OpenAI-Compatible 模型接入、显性产品化设计、真实前后端闭环。</text>

  <g class="shadow" transform="translate(86 210)">
