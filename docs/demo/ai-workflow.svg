    <text x="24" y="98" class="sectionTitle">声音克隆</text>
    <text x="24" y="132" class="body">1. 输入模型名和目标风格</text>
    <text x="24" y="166" class="body">2. AI 生成标签和描述</text>
    <text x="24" y="200" class="body">3. 上传或录制声音样本</text>
    <text x="24" y="234" class="body">4. 创建公开或私有模型</text>

