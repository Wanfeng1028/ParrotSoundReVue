    <text x="24" y="132" class="body">1. 指定课程主题和目标</text>
    <text x="24" y="166" class="body">2. 选择推理模型</text>
    <text x="24" y="200" class="body">3. 生成讲解稿与脚本</text>
    <text x="24" y="234" class="body">4. 保存任务并进入历史</text>

