  <circle cx="480" cy="388" r="11" class="node" />
  <circle cx="800" cy="388" r="11" class="node" />
  <circle cx="874" cy="388" r="11" class="node" />

  <rect x="118" y="614" width="1044" height="72" rx="26" fill="#e8ecff" />
  <text x="156" y="652" class="small">OpenAI-Compatible Provider Adapter  ·  Model Selector  ·  Async Task Queue  ·  Real API Errors</text>
  <text x="224" y="678" class="small">History Persistence  ·  Community Reuse  ·  Teaching MVP  ·  Frontend Demo Mode</text>
